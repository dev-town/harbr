name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --os '*' --cpu '*'

      - name: Verify tag matches package version
        id: version
        run: |
          version="$(bun -e "console.log((await Bun.file('package.json').json()).version)")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $version." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

          if [[ "$tag_version" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run checks
        run: bun run check

      - name: Package release artifacts
        run: bun run package:release

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          release_flags=()

          if [ "$IS_PRERELEASE" = "true" ]; then
            release_flags+=(--prerelease)
            release_notes="Beta release of harbr."
          else
            release_flags+=(--latest)
            release_notes="Release of harbr."
          fi

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/release/*.tar.gz \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              "${release_flags[@]}"
          else
            gh release create "$GITHUB_REF_NAME" dist/release/*.tar.gz \
              --repo "$GITHUB_REPOSITORY" \
              --title "harbr $GITHUB_REF_NAME" \
              --notes "$release_notes" \
              "${release_flags[@]}"
          fi

      - name: Checkout Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@v5
        with:
          repository: dev-town/homebrew-tap
          path: homebrew-tap
          token: ${{ env.HOMEBREW_TAP_TOKEN }}

      - name: Update Homebrew formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          bun scripts/update-homebrew-formula.ts \
            --formula homebrew-tap/Formula/harbr.rb \
            --manifest dist/release/manifest.json

      - name: Commit Homebrew formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        working-directory: homebrew-tap
        run: |
          if git diff --quiet -- Formula/harbr.rb; then
            echo "Homebrew formula already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/harbr.rb
          git commit -m "Update harbr to $GITHUB_REF_NAME"
          git push
